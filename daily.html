<!DOCTYPE html>
<html>

<head>
    <title>My Daily Task Organizer</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css">

    <style>
        body {
            background: #f4f2ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        h1,
        h3 {
            color: #5b21b6;
            font-weight: 700;
        }

        .card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 12px rgba(91, 33, 182, 0.08);
            background: white;
        }

        .box {
            background: #fafafa;
            color: #6d28d9;
            font-weight: 600;
            border-left: 4px solid #8b5cf6;
            border-radius: 8px;
        }

        .btn-custom {
            background: #7c3aed;
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            padding: 8px 16px;
            transition: all 0.2s ease-in-out;
        }

        .btn-custom:hover {
            background: #6d28d9;
            color: white;
            transform: translateY(-1px);
            box-shadow: 0 4px 8px rgba(124, 58, 237, 0.25);
        }

        .btn-custom:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <div class="container py-5">

        <div class="text-center mb-5">
            <h1 class="mb-2">☀️ My Daily Task Organizer</h1>
            <p class="text-muted lead">Sort and label your daily tasks using JavaScript array methods!</p>
        </div>

        <div class="card mb-4">
            <div class="card-body p-4">
                <h3 class="card-title h5 mb-3">Daily Tasks</h3>

                <button class="btn btn-custom mr-2" onclick="sortAZ()">Sort A to Z</button>
                <button class="btn btn-custom" onclick="sortZA()">Sort Z to A</button>

                <div id="taskResult" class="box p-3 mt-3"></div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body p-4">
                <h3 class="card-title h5 mb-3">Task Time Needed</h3>

                <button class="btn btn-custom mr-2" onclick="sortShortest()">Shortest First</button>
                <button class="btn btn-custom" onclick="sortLongest()">Longest First</button>

                <div id="timeResult" class="box p-3 mt-3"></div>
            </div>
        </div>

        <div class="card mb-4">
            <div class="card-body p-4">
                <h3 class="card-title h5 mb-3">Label Every Task Time</h3>

                <button class="btn btn-custom" onclick="addLabel()">Add Minutes Label</button>

                <div id="labelResult" class="box p-3 mt-3"></div>
            </div>
        </div>

    </div>

    <script>
        var tasks = ["Homework", "Breakfast", "Exercise", "Reading", "Packing Bag"];
        var minutes = [30, 15, 20, 25, 10];

        document.getElementById("taskResult").innerHTML =
            "Tasks: " + tasks;

        document.getElementById("timeResult").innerHTML =
            "Minutes needed: " + minutes;

        document.getElementById("labelResult").innerHTML =
            "Press the button above!";

        function sortAZ() {
            tasks.sort();
            document.getElementById("taskResult").innerHTML = "A to Z: " + tasks;
        }

        function sortZA() {
            tasks.sort();
            tasks.reverse();
            document.getElementById("taskResult").innerHTML = "Z to A: " + tasks;
        }

        function sortShortest() {
            minutes.sort(function (a, b) { return a - b; });
            document.getElementById("timeResult").innerHTML = "Shortest tasks first: " + minutes;
        }

        function sortLongest() {
            minutes.sort(function (a, b) { return b - a; });
            document.getElementById("timeResult").innerHTML = "Longest tasks first: " + minutes;
        }

        function addLabel() {
            var labelledMinutes = minutes.map(function (time) { return time + " minutes"; });
            document.getElementById("labelResult").innerHTML = "Labelled times: " + labelledMinutes;
        }
    </script>

</body>

</html>
